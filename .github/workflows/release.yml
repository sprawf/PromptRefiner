name: Build Windows Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
          pip install llama-cpp-python --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu

      - name: Build with PyInstaller
        run: pyinstaller PromptRefiner.spec

      - name: Zip release
        run: Compress-Archive -Path dist\PromptRefiner -DestinationPath PromptRefiner-windows.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: PromptRefiner-windows.zip
          body: |
            ## ⚡ PromptRefiner ${{ github.ref_name }}

            **Refine any text with AI — anywhere on Windows — in one hotkey.**

            ### Download & run
            1. Download `PromptRefiner-windows.zip` below
            2. Unzip anywhere
            3. Run `PromptRefiner.exe`

            > First launch downloads the local AI model (~1 GB, one-time).
            > For instant responses add a free API key in **Tray → Settings → Providers**.

            ### Free cloud keys (optional)
            | Provider | Speed | Link |
            |---|---|---|
            | Cerebras | ~0.3 s | https://cloud.cerebras.ai |
            | Groq | ~1–3 s | https://console.groq.com |

            **Hotkeys:** `Alt+Shift+W` refine · `Alt+Shift+E` prompt library
